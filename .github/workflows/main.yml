name: ci pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: install dependencies
        run: npm install
        
      - name: lint
        run: npm run lint
        
      - name: test
        run: npm run test
        
      - name: build
        run: npm run build
        
      - name: docker build and push
        run: |
          docker build -t whats-advanced .
          docker run -d -p 5000:5000 whats-advanced
